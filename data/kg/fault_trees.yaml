# 医疗设备知识图谱 — 设备-故障-维护映射
# 供 Agent 工具快速查询故障码和处理流程

PHIL-SV-COMPACT:
  name: "Philips SV-Compact 呼吸机"
  category: "生命支持"
  faults:
    E001:
      name: "气源压力不足"
      severity: warning
      causes:
        - "压缩空气气源压力低于 400 kPa"
        - "氧气供应压力低于 280 kPa"
        - "气源管路过滤器堵塞"
        - "压力传感器漂移"
      procedures:
        - "检查中央供气压力表"
        - "检查气源管路连接"
        - "更换气源管路过滤器"
        - "校准压力传感器"
    E004:
      name: "氧浓度过低"
      severity: critical
      causes:
        - "空气/氧气混合比例阀故障"
        - "氧传感器老化或校准失效"
        - "管路泄漏"
        - "中央供氧压力不足"
        - "氧浓度混合室堵塞"
      procedures:
        - "切换至简易呼吸囊手动通气"
        - "检查管路接头"
        - "检查气囊压力"
        - "检查中央供氧压力"
        - "校准氧传感器"
        - "更换氧传感器模组"
        - "更换比例阀"
    E005:
      name: "呼气阀卡滞"
      severity: warning
      causes:
        - "呼气阀阀门积碳或异物"
        - "弹簧疲劳或断裂"
        - "阀座磨损"
      procedures:
        - "拆卸呼气阀组件"
        - "清洁阀门和阀座"
        - "检查弹簧张力"
        - "更换受损部件"
    E006:
      name: "压力传感器漂移"
      severity: warning
      causes:
        - "传感器膜片老化"
        - "温度漂移"
        - "连接线松动"
      procedures:
        - "执行传感器零点校准"
        - "检查传感器连接线"
        - "更换传感器模组"
  maintenance_intervals:
    daily: ["开机自检", "管路检查", "湿化器清洗", "氧浓度检测", "电池测试"]
    weekly: ["更换一次性管路和过滤器", "清洁外壳", "检查气源", "测试报警", "备份数据"]
    monthly: ["更换氧电池", "校准潮气量传感器", "检查呼气阀", "清洁空气过滤器", "全参数校准"]
    yearly: ["全面功能测试", "更换一次性耗材", "气路密封性测试", "电气安全测试", "软件升级"]

GE-REV-APEX:
  name: "GE Revolution Apex CT 扫描仪"
  category: "影像诊断"
  faults:
    A002:
      name: "球管温度过高"
      severity: warning
      causes:
        - "连续扫描次数过多"
        - "散热风扇故障"
        - "冷却风道堵塞"
        - "球管老化散热效率下降"
      procedures:
        - "暂停扫描等待降温"
        - "检查散热风扇"
        - "清理冷却风道"
        - "调整扫描协议"
    A003:
      name: "高压发生器故障"
      severity: critical
      causes:
        - "高压电缆老化或绝缘击穿"
        - "高压发生器内部元件故障"
        - "控制板通信异常"
      procedures:
        - "检查高压电缆连接"
        - "重启高压发生器"
        - "更换高压电缆"
        - "更换高压发生器模块"
    F001:
      name: "探测器温度异常"
      severity: critical
      causes:
        - "冷却系统故障"
        - "探测器模块老化"
        - "环境温度过高"
        - "温度传感器故障"
      procedures:
        - "检查机房温度（18-26°C）"
        - "检查冷却系统水位和水温"
        - "重启冷却系统"
        - "更换温度传感器"
        - "联系售后更换探测器模组"
    F002:
      name: "数据采集系统通信中断"
      severity: critical
      causes:
        - "DAQS 连接松动"
        - "DAQS 板卡故障"
        - "探测器高压供电异常"
        - "光纤通信链路故障"
      procedures:
        - "关机重启"
        - "检查 DAQS 连接"
        - "更换 DAQS 板卡"
        - "检查高压供电"
  maintenance_intervals:
    daily: ["水校准", "球管日校准", "检查冷却系统", "清洁床面", "查看扫描日志"]
    weekly: ["空气校准", "检查散热曲线", "清洁空调滤网", "检查高压电缆", "测试急停按钮"]
    monthly: ["更换冷却过滤器", "检查球管寿命", "探测器校准", "床面精度检查", "备份配置"]
    yearly: ["更换制冷剂和冷却水", "球管检测", "高压校准", "辐射剂量检测", "机械润滑", "软件升级"]

MINDRAY-T12:
  name: "Mindray BeneView T12 监护仪"
  category: "监测"
  faults:
    E101:
      name: "心电导联脱落"
      severity: warning
      causes:
        - "导联线插头松动"
        - "导联线内部断裂"
        - "电极片脱落"
      procedures:
        - "检查导联线连接"
        - "更换导联线"
        - "更换电极片"
    E102:
      name: "SpO2 信号弱"
      severity: warning
      causes:
        - "探头位置不当"
        - "患者末梢循环差"
        - "指甲油干扰"
        - "探头光源衰减"
      procedures:
        - "重新放置探头"
        - "更换测量部位"
        - "清除指甲油"
        - "更换 SpO2 探头"
    E103:
      name: "NIBP 测量失败"
      severity: warning
      causes:
        - "袖带尺寸不合适"
        - "管路漏气"
        - "患者频繁移动"
        - "泵故障"
      procedures:
        - "更换合适尺寸袖带"
        - "检查管路"
        - "等待患者静止后重试"
        - "更换袖带和管路"
    F001:
      name: "心电模块故障"
      severity: critical
      causes:
        - "导联线断路"
        - "放大器故障"
      procedures:
        - "检查导联线"
        - "更换心电模块"
  maintenance_intervals:
    daily: ["检查导联线和探头", "清洁设备表面", "测试电池", "确认报警功能"]
    weekly: ["校准 NIBP 模块", "检查 SpO2 探头", "清洁散热风扇", "备份数据"]
    monthly: ["校全心电模块", "全面电气安全检测"]
    yearly: ["所有参数精度校准", "显示屏亮度校准", "扬声器测试", "软件升级"]

PHIL-IE33:
  name: "Philips iE33 超声诊断仪"
  category: "影像诊断"
  faults:

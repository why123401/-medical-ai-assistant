        - "重启系统"
        - "更换显示屏模组"
  maintenance_intervals:
    daily: ["清洁探头和机身", "检查探头完整性", "运行自检程序"]
    weekly: ["校准图像分辨率", "检查所有探头", "清洁散热风扇"]
    monthly: ["全面图像质量测试", "校准多普勒频率", "检查机械臂"]
    yearly: ["声学性能检测", "电气安全测试", "软件升级", "探头深度校准"]

        - "接口松动"
      procedures:
        - "检查探头线缆"
        - "清洁连接器"
        - "重新插紧探头"
        - "更换探头"
    U002:
      name: "冷却风扇故障"
      severity: warning
      causes:
        - "风扇轴承磨损"
        - "风扇电机故障"
        - "灰尘堵塞"
      procedures:
        - "清洁散热风扇"
        - "更换风扇电机"
        - "检查风扇连接"
    U003:
      name: "显示屏通信中断"
      severity: critical
      causes:
        - "排线松动"
        - "显卡故障"
        - "主板通信异常"
      procedures:
